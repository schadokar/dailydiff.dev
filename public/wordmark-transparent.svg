<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 56" width="272" height="56" role="img" aria-label="DailyDiff.dev">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;family=Architects+Daughter&amp;display=swap');
    </style>
  </defs>
  <!-- No background — use on dark surfaces only -->
  <!-- ∂ mark: Caveat 700, accent -->
  <text x="14" y="40"
        font-family="'Caveat', 'Comic Sans MS', cursive"
        font-size="38" font-weight="700"
        fill="#eca852" dominant-baseline="auto">∂</text>
  <!-- DailyDiff.dev: tspan so .dev tracks DailyDiff's actual width -->
  <text x="48" y="38"
        font-family="'Architects Daughter', 'Comic Sans MS', cursive"
        font-size="19" font-weight="400">
    <tspan letter-spacing="1.8" fill="#ece8d8">Daily</tspan><tspan letter-spacing="1.8" fill="#eca852">Diff</tspan><tspan letter-spacing="0.5" fill="#9a9588">.dev</tspan>
  </text>
</svg>
